<!doctype html>
<html lang="en">
  <head>
    <!--Website Author-->
    <link rel="author" href="https://github.com/abir-cse-dev" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link rel="icon" href="images/etmt_logo.jpeg" />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electro Mata</title>
    <style>
      html {
        /* Automatically scales the base size between 12px and 16px based on screen width */
        font-size: clamp(12px, 1vw + 8px, 16px);
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #050816;
        color: #fff;
      }
      nav {
        background: linear-gradient(
          to bottom,
          rgba(10, 15, 30, 1) 0%,
          rgba(10, 15, 30, 0.8) 70%,
          rgba(10, 15, 30, 0.4) 100%
        );

        /* Optional: Ensure text remains readable over the background */
        color: #ffffff;

        position: sticky;
        top: 0;
        padding: 10px;
        text-align: center;
      }
      nav a {
        color: #00e5ff;
        text-decoration: none;
        margin: 25px;
      }
      .hero {
        text-align: center;
        padding: 60px 20px;
      }

      .card {
        /* Semi-transparent dark background (0.6 makes it 60% opaque) */
        background: rgba(15, 23, 42, 0.6);

        /* Optional: A very subtle border to help define the card edges over the background */
        border: 1px solid rgba(255, 255, 255, 0.05);

        margin: 20px auto;
        padding: 20px;
        border-radius: 15px;
        max-width: 1100px;
        width: 90%;
      }
      h1,
      h2 {
        color: #00e5ff;
      }
      .btn {
        background: #00e5ff;
        color: #000;
        border: none;
        padding: 12px 20px;
        border-radius: 10px;
        cursor: pointer;
      }
      footer {
        text-align: center;
        padding: 30px;
      }
      @media (max-width: 480px) {
        nav {
          font-size: 15px;
        }
        .card {
          font-size: 10px;
        }

        /* Shrinks all images to roughly 60% of their desktop size while keeping proportions */
        .card img {
          max-width: 60%;
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html">Home</a>
      <a href="roadmap.html">Roadmap</a>
      <a href="community.html">Community</a>
    </nav>
    <div class="card" id="community">
      <h2>Community</h2>
      <div>
        <table border="0">
          <tr>
            <td align="center" style="padding-right: 50px">
              <h3>Telegram</h3>
            </td>
            <td align="center" style="padding-right: 50px"><h3>X</h3></td>
          </tr>
          <tr>
            <td align="center" style="padding-right: 50px">
              <a href="https://t.me/ETMTcoin" target="_blank"
                ><img src="images/tele_icon.png" alt="logo" width="69"
              /></a>
            </td>
            <td align="center" style="padding-right: 50px">
              <a href="https://x.com/etmtcoin?s=21" target="_blank"
                ><img src="images/x_icon.png" alt="logo" width="73"
              /></a>
            </td>
          </tr>
        </table>
      </div>
    </div>

    <div class="card">
      <table>
        <tr>
          <td align="center" style="padding-right: 50px"><h3>Discord</h3></td>
          <td align="center" style="padding-right: 50px"><h3>YouTube</h3></td>
        </tr>
        <tr>
          <td align="center" style="padding-right: 50px">
            <a href="https://discord.gg/f6UKbQpXCY" target="_blank"
              ><img src="images/discord_icon.png" alt="logo" width="80"
            /></a>
          </td>
          <td align="center" style="padding-right: 50px">
            <a
              href="https://youtube.com/@etmtcoin?si=-ebDeqqiB89016oz"
              target="_blank"
              ><img src="images/youtube_icon.png" alt="logo" width="79"
            /></a>
          </td>
        </tr>
      </table>
    </div>

    <footer>© Electro Mata</footer>
  </body>
</html>
